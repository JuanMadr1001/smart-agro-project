<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAgro Sucre - Nodo Multifuente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --green: #10b981; --blue: #3b82f6; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .header { background: rgba(30, 41, 59, 0.8); border-bottom: 1px solid #334155; padding: 20px 0; }
        .cyber-title { font-family: 'Orbitron'; color: var(--green); letter-spacing: 2px; }
        .main-card { background: var(--card); border: 1px solid #334155; border-radius: 16px; padding: 20px; height: 100%; }
        .prediction-item { background: rgba(15, 23, 42, 0.5); border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 4px solid #334155; }
        .rain-active { border-left-color: var(--blue); background: rgba(59, 130, 246, 0.1); }
        .dry-active { border-left-color: var(--green); background: rgba(16, 185, 129, 0.1); }
        select { background: #334155; color: white; border: 1px solid var(--green); border-radius: 8px; padding: 8px; width: 100%; }
    </style>
</head>
<body>

<header class="header mb-4 text-center">
    <h2 class="cyber-title">SMARTAGRO <span class="text-white">SUCRE</span></h2>
    <p class="text-secondary small mb-0 h6">Hito 60%: Sistema de Auditoría Multifuente</p>
</header>

<div class="container pb-5">
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="main-card shadow">
                <label class="text-secondary small fw-bold mb-2">PROVEEDOR DE DATOS</label>
                <select id="apiSelector" onchange="iniciarCarga()">
                    <option value="openmeteo">Open-Meteo (Recomendado)</option>
                    <option value="tomorrow">Tomorrow.io</option>
                </select>
                
                <hr class="my-4 border-secondary">
                
                <h6 class="fw-bold mb-3 d-flex justify-content-between">
                    <span>📅 Planificador</span>
                    <span id="label-api" class="badge bg-dark text-info">OPEN-METEO</span>
                </h6>
                <div id="agro-planner">
                    </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="main-card shadow">
                <h6 class="fw-bold mb-4 text-secondary">COMPORTAMIENTO TÉRMICO DIARIO</h6>
                <canvas id="mainChart" height="220"></canvas>
                
                <div class="mt-4 p-3 rounded bg-dark border-start border-3 border-info">
                    <p class="small mb-0 text-secondary">
                        <strong>Estado del Nodo:</strong> <span id="sys-status" class="text-success">OPERATIVO</span><br>
                        <strong>Coordenadas:</strong> 9.30° N, -75.40° W (Sincelejo)
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Configuración
    const TOMORROW_KEY = "FWLyeEPJ4NWQg79qY1WiUghvzx0y9cxs"; // REEMPLAZA ESTO
    const lat = 9.30, lon = -75.40;
    let chartObj = null;

    async function iniciarCarga() {
        const source = document.getElementById('apiSelector').value;
        const status = document.getElementById('sys-status');
        document.getElementById('label-api').innerText = source.toUpperCase();
        
        status.innerText = "SINCRONIZANDO...";
        status.className = "text-warning";

        try {
            let labels = [], temps = [], rains = [], vols = [];

            if (source === 'openmeteo') {
                const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,precipitation_probability_max,precipitation_sum&timezone=auto&forecast_days=5`);
                const d = await r.json();
                labels = d.daily.time;
                temps = d.daily.temperature_2m_max;
                rains = d.daily.precipitation_probability_max;
                vols = d.daily.precipitation_sum;
            } 
            else {
                // Fetch a Tomorrow.io con manejo de errores robusto
                const r = await fetch(`https://api.tomorrow.io/v4/weather/forecast?location=${lat},${lon}&apikey=${TOMORROW_KEY}&units=metric`);
                const d = await r.json();
                
                console.log("LOG_AGRO: Datos crudos", d);

                // Validamos que existan los datos
                if (!d.timelines || !d.timelines.daily) {
                    throw new Error("Estructura de API no válida o Key expirada");
                }

                d.timelines.daily.slice(0, 5).forEach(day => {
                    labels.push(day.time.split('T')[0]);
                    // Tomorrow usa 'temperatureAvg' o 'temperatureMax'
                    temps.push(day.values.temperatureAvg || day.values.temperatureMax || 0);
                    rains.push(day.values.precipitationProbabilityMax || day.values.precipitationProbability || day.values.precipitationProbabilityAvg || 0);
                    vols.push(day.values.rainAccumulationMax || 0);
                });
            }

            renderizarUI(labels, temps, rains, vols, source);
            status.innerText = "CONEXIÓN EXITOSA";
            status.className = "text-success";

        } catch (err) {
            console.error("LOG_AGRO Error:", err);
            status.innerText = "ERROR DE RESPUESTA";
            status.className = "text-danger";
            alert("Error al conectar con la fuente. Revisa tu API Key.");
        }
    }

    function renderizarUI(labels, temps, rains, vols, source) {
    const planner = document.getElementById('agro-planner');
    if (!planner) return; // Seguridad para evitar errores si el div no existe
    
    planner.innerHTML = "";
    
    labels.forEach((date, i) => {
        // Usamos los datos que ya extrajiste (rains y vols)
        const pLluvia = rains[i];
        const vLluvia = vols[i];

        // Lógica de decisión técnica para el diseño
        // Si la probabilidad es > 40% o el acumulado > 1.5mm, se activa el modo lluvia
        const esLluvia = pLluvia > 40 || vLluvia > 1.5;

        planner.innerHTML += `
            <div class="prediction-item ${esLluvia ? 'rain-active' : 'dry-active'}">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <span class="fw-bold small text-white">${date.split('-')[2]}/${date.split('-')[1]}</span>
                    <span class="fw-bold text-uppercase" style="font-size:0.65rem; color:${esLluvia ? '#3b82f6' : '#10b981'}">
                        ${esLluvia ? '💧 LLUVIA DETECTADA' : '☀️ DÍA SECO'}
                    </span>
                </div>
                <div class="small text-secondary" style="font-size:0.7rem">
                    Probabilidad: ${pLluvia}% | Acumulado: ${vLluvia.toFixed(1)}mm
                </div>
            </div>`;
    });

    // Actualizamos la gráfica con los nuevos datos
    actualizarGrafica(labels, temps, source);
}

// Función auxiliar para que la gráfica no se rompa al cambiar de API
function actualizarGrafica(labels, temps, source) {
    if (chartObj) chartObj.destroy();
    const ctx = document.getElementById('mainChart').getContext('2d');
    chartObj = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels.map(l => l.split('-')[2] + '/' + l.split('-')[1]),
            datasets: [{
                label: 'Temperatura Máxima (°C) - ' + source.toUpperCase(),
                data: temps,
                borderColor: source === 'openmeteo' ? '#10b981' : '#3b82f6',
                backgroundColor: source === 'openmeteo' ? 'rgba(16, 185, 129, 0.1)' : 'rgba(59, 130, 246, 0.1)',
                fill: true,
                tension: 0.4,
                borderWidth: 3
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: {
                y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
            }
        }
    });
}

    // Carga inicial
    iniciarCarga();
</script>
</body>
</html>
