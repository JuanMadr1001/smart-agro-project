<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SmartAgro System - Avance 30%</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; color: white; }
        .accent-green { color: #10b981; }
        .accent-blue { color: #3b82f6; }
        .chart-container { position: relative; height: 350px; }
        .badge-agro { font-size: 0.8rem; padding: 5px 12px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="fw-bold mb-0">Predicción Climatica <span class="accent-green">Departamento de Sucre</span></h1>
                <p class="text-secondary">Nodo Regional: Sincelejo, Sucre | Monitoreo de Precisión</p>
            </div>
            <span class="badge bg-success badge-agro">SISTEMA ONLINE</span>
        </div>
        
        <div class="row g-4 mb-4 text-center">
            <div class="col-md-3">
                <div class="card p-3 shadow-sm">
                    <h6 class="text-secondary small">TEMP. ACTUAL</h6>
                    <h2 id="temp-val" class="fw-bold">--</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 shadow-sm">
                    <h6 class="text-secondary small">HUMEDAD SUELO</h6>
                    <h2 id="soil-val" class="accent-blue fw-bold">--</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 shadow-sm">
                    <h6 class="text-secondary small">EVAPOTRANSPIRACIÓN</h6>
                    <h2 id="et0-val" class="accent-green fw-bold">--</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 shadow-sm">
                    <h6 class="text-secondary small">PUNTO DE ROCÍO</h6>
                    <h2 id="dew-val" class="text-warning fw-bold">--</h2>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-9">
                <div class="card p-4 shadow-lg mb-4">
                    <h5 class="fw-bold mb-4">Correlación Temperatura vs Humedad (48h)</h5>
                    <div class="chart-container">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-lg-3">
                <div class="card p-4 shadow-lg h-100">
                    <h5 class="fw-bold mb-3">Alertas</h5>
                    <hr class="border-secondary">
                    <div id="alert-container">
                        <p class="small text-secondary">Iniciando algoritmos de predicción...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function runSmartAgro() {
            // Ubicación Sincelejo
            const url = "https://api.open-meteo.com/v1/forecast?latitude=9.30&longitude=-75.40&hourly=temperature_2m,relative_humidity_2m,soil_moisture_0_to_10cm,et0_fao_evapotranspiration,dew_point_2m&past_days=1&forecast_days=1";

            try {
                const res = await fetch(url);
                const data = await res.json();
                
                // Buscador dinámico de hora actual
                const now = new Date();
                const nowISO = now.toISOString().split(':')[0] + ":00";
                const idx = data.hourly.time.findIndex(t => t.includes(nowISO)) || 24;

                // Cargar valores actuales
                document.getElementById('temp-val').innerText = data.hourly.temperature_2m[idx] + "°C";
                document.getElementById('soil-val').innerText = (data.hourly.soil_moisture_0_to_10cm[idx] * 100).toFixed(1) + "%";
                document.getElementById('et0-val').innerText = data.hourly.et0_fao_evapotranspiration[idx] + "mm";
                document.getElementById('dew-val').innerText = data.hourly.dew_point_2m[idx] + "°C";

                // Lógica de Alertas Avanzada
                const alerts = document.getElementById('alert-container');
                alerts.innerHTML = ""; // Limpiar
                
                const soilTrend = data.hourly.soil_moisture_0_to_10cm[idx] - data.hourly.soil_moisture_0_to_10cm[idx-6];
                
                if(soilTrend < 0) {
                    alerts.innerHTML += `<div class="alert alert-danger py-2 small">⚠️ PÉRDIDA DE HUMEDAD: El suelo se está secando aceleradamente.</div>`;
                }
                if(data.hourly.temperature_2m[idx] > 33) {
                    alerts.innerHTML += `<div class="alert alert-warning py-2 small">🔥 ESTRÉS TÉRMICO: Riesgo alto para cultivos sensibles.</div>`;
                }
                if(alerts.innerHTML === "") {
                    alerts.innerHTML = `<div class="alert alert-success py-2 small">✅ ESTABLE: Condiciones óptimas de crecimiento.</div>`;
                }

                // Gráfica Multieje
                const ctx = document.getElementById('mainChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.hourly.time.slice(idx-12, idx+12).map(t => t.split('T')[1]),
                        datasets: [{
                            label: 'Temp. Aire (°C)',
                            data: data.hourly.temperature_2m.slice(idx-12, idx+12),
                            borderColor: '#ef4444',
                            yAxisID: 'y',
                            tension: 0.4
                        }, {
                            label: 'Hum. Suelo (%)',
                            data: data.hourly.soil_moisture_0_to_10cm.slice(idx-12, idx+12).map(v => v*100),
                            borderColor: '#3b82f6',
                            yAxisID: 'y1',
                            tension: 0.4,
                            fill: true,
                            backgroundColor: 'rgba(59, 130, 246, 0.1)'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: { type: 'linear', position: 'left', title: { display: true, text: 'Temperatura °C', color: '#f8fafc' } },
                            y1: { type: 'linear', position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'Humedad Suelo %', color: '#f8fafc' } }
                        },
                        plugins: { legend: { labels: { color: '#f8fafc' } } }
                    }
                });

            } catch (e) {
                console.error(e);
            }
        }

        runSmartAgro();
    </script>
</body>
</html>
